version: '3.8'

services:
  # Usługa bazy danych PostgreSQL
  db:
    image: postgres:17.4-alpine
    container_name: flashcards-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${SUPER_USER}
      - POSTGRES_PASSWORD=${SUPER_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - flashcards-network
    ports:
      - "${EXPOSE_DB_PORT:-''}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Usługa backendu Java (Spring Boot)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flashcards-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
    ports:
      - "${BACKEND_PORT}:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - flashcards-network

  # Usługa Ollama
  ollama:
    build:
      context: ./docker/ollama
      dockerfile: Dockerfile
    container_name: flashcards-ollama
    restart: unless-stopped
    pull_policy: always
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - flashcards-network
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=3
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_THREADS=4
    deploy:
      resources:
        reservations:
          cpus: '2.0'
          memory: 8G
        limits:
          cpus: '3.5'
          memory: 12G

# Definicja sieci
networks:
  flashcards-network:
    driver: bridge

# Definicja wolumenów dla trwałości danych
volumes:
  postgres-data:
    driver: local
  ollama-data:
    driver: local