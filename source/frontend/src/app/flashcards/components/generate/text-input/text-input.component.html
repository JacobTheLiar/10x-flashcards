<mat-form-field appearance="fill" class="text-input-container">
  <mat-label>{{ placeholder }}</mat-label>
  <textarea
    matInput
    [(ngModel)]="inputValue"
    [placeholder]="placeholder"
    [disabled]="disabled"
    (ngModelChange)="onTextChange($event)"
    rows="10"
  ></textarea>
  <mat-hint align="end">{{ inputValue.length || 0 }} / {{ maxLength }}</mat-hint>
</mat-form-field>
