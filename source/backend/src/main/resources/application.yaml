spring:
  application:
    name: flashcards
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:flashcards}
    username: ${POSTGRES_USER:flashcards_user}
    password: ${POSTGRES_PASSWORD:flashcards_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      pool-name: FlashcardsHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    url: ${spring.datasource.url}
    user: ${SUPER_USER:postgres}
    password: ${SUPER_PASSWORD:admin_password}
    placeholders:
      app_password: ${DB_PASSWORD:flashcards_password}
      app_username: ${DB_USER:flashcards_user}

ai:
  ollama:
    url: ${OLLAMA_URL:http://ollama:11434}
    model: ${OLLAMA_MODEL:gemma2:2b}

jwt:
  secret: 
  expiration:
    access: 9000000
    refresh: 604800000