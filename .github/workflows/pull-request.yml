name: Pull Request Workflow

on:
  pull_request:
    branches: [ develop ]

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:17.4-alpine
        env:
          POSTGRES_USER: ${{ secrets.SUPER_USER }}
          POSTGRES_PASSWORD: ${{ secrets.SUPER_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DB_NAME }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U ${{ secrets.SUPER_USER }} -d ${{ secrets.DB_NAME }}
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Run backend tests
        run: mvn -B test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/${{ secrets.DB_NAME }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.DB_USER }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SPRING_PROFILES_ACTIVE: test
          SUPER_USER: ${{ secrets.SUPER_USER }}
          SUPER_PASSWORD: ${{ secrets.SUPER_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_USER: ${{ secrets.DB_USER }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION_MS: ${{ secrets.JWT_EXPIRATION_MS }}

  build-docker-backend:
    name: Build Backend Docker Image
    runs-on: ubuntu-latest
    needs: test-backend # Zależność od pomyślnych testów backendu
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker-compose build backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/${{ secrets.DB_NAME }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.DB_USER }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SPRING_PROFILES_ACTIVE: test
          SUPER_USER: ${{ secrets.SUPER_USER }}
          SUPER_PASSWORD: ${{ secrets.SUPER_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_USER: ${{ secrets.DB_USER }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION_MS: ${{ secrets.JWT_EXPIRATION_MS }}

  build-docker-frontend:
    name: Build Frontend Docker Image
    runs-on: ubuntu-latest
    needs: test-backend # Zależność od pomyślnych testów backendu
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build frontend image
        run: docker-compose build frontend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/${{ secrets.DB_NAME }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.DB_USER }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SPRING_PROFILES_ACTIVE: test
          SUPER_USER: ${{ secrets.SUPER_USER }}
          SUPER_PASSWORD: ${{ secrets.SUPER_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_USER: ${{ secrets.DB_USER }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION_MS: ${{ secrets.JWT_EXPIRATION_MS }}

  status-comment:
    name: Post Status Comment
    runs-on: ubuntu-latest
    needs: [build-docker-backend, build-docker-frontend] # Komentarz po pomyślnym zbudowaniu obu obrazów Docker
    if: success()
    steps:
      - name: Post comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.issue.number;
            if (!prNumber) {
              console.log('Could not get pull request number from context, exiting');
              return;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: '✅ Backend tests passed and Docker images built successfully!'
            });