name: Pull Request Workflow

on:
  pull_request:
    branches: [ develop ]

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:17.4-alpine
        env:
          # Użyj sekretów GitHub do konfiguracji bazy danych dla testów
          POSTGRES_USER: ${{ secrets.SUPER_USER }}
          POSTGRES_PASSWORD: ${{ secrets.SUPER_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DB_NAME }}
        ports:
          # Mapowanie portu, aby testy mogły łączyć się przez localhost:5432,
          # jeśli tak są skonfigurowane. Domyślnie Spring będzie szukał na localhost.
          # Alternatywnie, można użyć nazwy usługi 'db' w JDBC URL.
          - 5432:5432
        # Opcje healthchecka, aby upewnić się, że baza jest gotowa przed uruchomieniem testów
        options: >-
          --health-cmd pg_isready -U ${{ secrets.DB_USER }} -d ${{ secrets.DB_NAME }}
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Run backend tests
        run: mvn -B test
        env:
          # Przekaż odpowiednie zmienne środowiskowe do Spring Boot / Mavena
          # aby Twoje testy mogły połączyć się z usługą bazy danych 'db'.
          # Jeśli Twoje pliki application-test.properties odczytują zmienne systemowe,
          # upewnij się, że odpowiednie nazwy zmiennych są tu użyte.
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/${{ secrets.DB_NAME }} # lub jdbc:postgresql://db:5432/...
          SPRING_DATASOURCE_USERNAME: ${{ secrets.DB_USER }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SPRING_PROFILES_ACTIVE: test # Upewnij się, że profil 'test' jest aktywny, jeśli go używasz
          # Dodaj inne sekrety/zmienne potrzebne dla testów, np.
          # SUPER_USER: ${{ secrets.SUPER_USER_TEST }} # Jeśli używane w testach

  status-comment:
    name: Post Status Comment
    runs-on: ubuntu-latest
    needs: test-backend
    if: success()
    steps:
      - name: Post comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.issue.number;
            if (!prNumber) {
              console.log('Could not get pull request number from context, exiting');
              return;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: '✅ Backend tests passed successfully!'
            });