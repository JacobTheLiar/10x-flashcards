name: Pull Request Workflow

on:
  pull_request:
    branches: [ develop ]

permissions:
  contents: read
  pull-requests: write  # To pozwala na dodawanie komentarzy do PR

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:  # Zmieniona nazwa serwisu
        image: postgres:17.4-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin_password
          POSTGRES_DB: flashcards
        ports:
          - 5432:5432  # Eksponowanie portu na host
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Run backend tests
        run: |
          cd source/backend
          mvn -B test
        env:
          SPRING_PROFILES_ACTIVE: test
          DB_PASSWORD: admin_password
          DB_USER: postgres
          DB_NAME: flashcards
          SUPER_USER: postgres
          SUPER_PASSWORD: admin_password
          DB_HOST: localhost  # Zmiana z "db" na "localhost"
          POSTGRES_USER: postgres  # Dodane dla zgodności z application.yaml
          POSTGRES_PASSWORD: admin_password  # Dodane dla zgodności z application.yaml
          JWT_SECRET: 
          JWT_EXPIRATION_MS: 9000000


  build-docker-backend:
    name: Build Backend Docker Image
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Compose
        uses: KengoTODA/actions-setup-docker-compose@v1
        with:
          version: '2.21.0'

      - name: Create .env file
        run: |
          cd source
          echo "BACKEND_PORT=8080" > .env
          echo "FRONTEND_PORT=4200" >> .env
          echo "EXPOSE_DB_PORT=5432:5432" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "SUPER_USER=${{ secrets.SUPER_USER }}" >> .env
          echo "SUPER_PASSWORD=${{ secrets.SUPER_PASSWORD }}" >> .env
          echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "JWT_EXPIRATION_MS=${{ secrets.JWT_EXPIRATION_MS }}" >> .env
          echo "SPRING_PROFILES_ACTIVE=test" >> .env

      - name: Build backend image
        run: cd source && docker-compose build backend


  build-docker-frontend:
    name: Build Frontend Docker Image
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Compose
        uses: KengoTODA/actions-setup-docker-compose@v1
        with:
          version: '2.21.0'

      - name: Create .env file
        run: |
          cd source
          echo "BACKEND_PORT=8080" > .env
          echo "FRONTEND_PORT=4200" >> .env
          echo "EXPOSE_DB_PORT=5432:5432" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "SUPER_USER=${{ secrets.SUPER_USER }}" >> .env
          echo "SUPER_PASSWORD=${{ secrets.SUPER_PASSWORD }}" >> .env
          echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "JWT_EXPIRATION_MS=${{ secrets.JWT_EXPIRATION_MS }}" >> .env
          echo "SPRING_PROFILES_ACTIVE=test" >> .env

      - name: Build frontend image
        run: cd source && docker-compose build frontend


  status-comment:
    name: Post Status Comment
    runs-on: ubuntu-latest
    needs: [build-docker-backend, build-docker-frontend] # Komentarz po pomyślnym zbudowaniu obu obrazów Docker
    if: success()
    steps:
      - name: Post comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.issue.number;
            if (!prNumber) {
              console.log('Could not get pull request number from context, exiting');
              return;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: '✅ Backend tests passed and Docker images built successfully!'
            });


